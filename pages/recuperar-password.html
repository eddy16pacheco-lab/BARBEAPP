<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarbApp | Recuperar Contraseña</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-theme.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1 onclick="window.location.href='../index.html'">BarbApp</h1>
        </div>
        <nav class="nav-links" id="navLinks">
            <a href="../index.html">Inicio</a>
            <a href="servicios.html">Servicios</a>
            <a href="reservas.html">Reservar</a>
            <a href="promociones.html">Promociones</a>
        </nav>
        <div class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <div class="form-container">
        <h2 style="text-align: center; color: #c9a959; margin-bottom: 2rem;">Recuperar Contraseña</h2>
        
        <p style="text-align: center; color: #b0b0b0; margin-bottom: 2rem;">
            Te enviaremos un enlace a tu correo para restablecer tu contraseña
        </p>
        
        <form onsubmit="recoverPassword(event)">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <button type="submit" class="btn-book" style="margin-bottom: 1rem;">Enviar Enlace</button>
            
            <p style="text-align: center;">
                <a href="login.html" style="color: #c9a959; text-decoration: none;">
                    Volver a Iniciar Sesión
                </a>
            </p>
        </form>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>BarbApp</h3>
                <p>La mejor experiencia en barbería.</p>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
        <div class="copyright">
            <p>&copy; 2025 BarbApp. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
