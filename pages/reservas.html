<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarbApp | Reservar Cita</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dark-theme.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1 onclick="window.location.href='../index.html'">BarbApp</h1>
        </div>
        <nav class="nav-links" id="navLinks">
            <a href="../index.html">Inicio</a>
            <a href="servicios.html">Servicios</a>
            <a href="reservas.html" class="active">Reservar</a>
            <a href="promociones.html">Promociones</a>
        </nav>
        <div class="auth-buttons">
            <button class="btn-login" onclick="window.location.href='login.html'">
                <i class="fas fa-user"></i> Iniciar Sesión
            </button>
        </div>
        <div class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <div class="section">
        <h2 class="section-title">Reserva tu Cita</h2>
        
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
            <div>
                <!-- Selección de Servicio -->
                <div style="background: #1a1a1a; padding: 2rem; border-radius: 15px; margin-bottom: 2rem;">
                    <h3 style="color: #c9a959; margin-bottom: 1rem;">1. Elige tu Servicio</h3>
                    <div id="servicesList"></div>
                </div>

                <!-- Selección de Barbero -->
                <div style="background: #1a1a1a; padding: 2rem; border-radius: 15px; margin-bottom: 2rem;">
                    <h3 style="color: #c9a959; margin-bottom: 1rem;">2. Elige tu Barbero</h3>
                    <div id="barbersList"></div>
                </div>

                <!-- Selección de Fecha y Hora -->
                <div style="background: #1a1a1a; padding: 2rem; border-radius: 15px; margin-bottom: 2rem;">
                    <h3 style="color: #c9a959; margin-bottom: 1rem;">3. Elige Fecha y Hora</h3>
                    
                    <div class="dates-carousel" id="datesList" style="display: flex; gap: 1rem; margin-bottom: 2rem; overflow-x: auto; padding: 1rem 0;"></div>
                    
                    <div class="time-slots" id="timeSlots"></div>
                </div>

                <button class="btn-cta" style="width: 100%;" onclick="confirmBooking()">
                    Confirmar Reserva
                </button>
            </div>

            <!-- Resumen de Reserva -->
            <div style="background: #1a1a1a; padding: 2rem; border-radius: 15px; position: sticky; top: 100px; height: fit-content;">
                <div id="bookingSummary">
                    <h3 style="color: #c9a959; margin-bottom: 1rem;">Resumen de Reserva</h3>
                    <p style="color: #b0b0b0;">Selecciona los servicios para ver el resumen</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>BarbApp</h3>
                <p>La mejor experiencia en barbería.</p>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
        </div>
        <div class="copyright">
            <p>&copy; 2025 BarbApp. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script src="../js/reservas.js"></script>
</body>
</html>
